name: GLAW Doctor
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Syntax check (no deps)
        run: |
          set -e
          for f in bin/glaw bin/glaw-setup bin/glaw-doctor bin/glaw-bookkeeping-doctor bin/glaw-preamble.sh; do bash -n "$f"; done
          for f in bin/*; do head -1 "$f" | grep -q 'python' && python3 -m py_compile "$f" || true; done
          echo "syntax OK"

      - name: Deploy skills + run glaw-doctor (core mode)
        run: |
          mkdir -p ~/.claude/skills
          ln -s "$GITHUB_WORKSPACE" ~/.claude/skills/glaw
          bash bin/glaw-setup
          GLAW_DOCTOR_CORE=1 bash bin/glaw-doctor

      - name: Bookkeeping source-only doctor
        run: GLAW="$GITHUB_WORKSPACE" bash bin/glaw-bookkeeping-doctor

      - name: Bookkeeping engine + finance tools smoke
        run: |
          for t in lib/bookkeeping/test_*.py; do
            echo "== $t"
            GLAW="$GITHUB_WORKSPACE" GLAW_HOME=$(mktemp -d) PYTHONPATH="$GITHUB_WORKSPACE/lib/bookkeeping:$GITHUB_WORKSPACE" python3 "$t"
          done

      - name: Zero third-party package guard
        run: |
          set -e
          ! find . \( -name requirements.txt -o -name pyproject.toml -o -name package.json -o -name package-lock.json -o -name yarn.lock -o -name pnpm-lock.yaml \) -print | grep -q .
          ! grep -rIE '^\s*(from|import)\s+(pydantic|pandas|lxml|defusedxml|pypdf|PyPDF2|pypdfium2|litellm|polars|fastapi|uvicorn|google|googleapiclient|openpyxl|docxtpl|eyecite|jsonschema|juriscraper|requests)\b' bin lib federal-trial-counsel seats docx
