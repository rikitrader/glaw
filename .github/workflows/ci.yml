          GLAW_HOME=$(mktemp -d) /tmp/bkv/bin/python lib/bookkeeping/test_tamper.py
          GLAW_HOME=$(mktemp -d) /tmp/bkv/bin/python lib/bookkeeping/test_concurrency.py
