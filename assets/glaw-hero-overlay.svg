<svg xmlns="http://www.w3.org/2000/svg" width="1408" height="768" viewBox="0 0 1408 768" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="topband" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05070d" stop-opacity="0.92"/>
      <stop offset="0.7" stop-color="#05070d" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#05070d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F2C75B" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#F2C75B"/>
      <stop offset="1" stop-color="#F2C75B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#FBE7AE"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.8"/></filter>
  </defs>

  <image href="glaw-hero-source.png" x="0" y="0" width="1408" height="768"/>

  <!-- top description band -->
  <rect x="0" y="0" width="1408" height="170" fill="url(#topband)"/>
  <text x="704" y="58" text-anchor="middle" font-size="40" font-weight="800" letter-spacing="3" fill="url(#title)" filter="url(#sh)">GLAW · THE OPEN-SOURCE VIRTUAL LAW FIRM</text>
  <rect x="404" y="74" width="600" height="3" rx="1.5" fill="url(#gold)"/>
  <text x="704" y="108" text-anchor="middle" font-size="21" font-weight="600" fill="#E7EEFB" filter="url(#sh)">A full AI law firm you install as a skill — not a chatbot, an org chart.</text>
  <text x="704" y="138" text-anchor="middle" font-size="17" fill="#AEBED6" filter="url(#sh)">AI legal departments run your matters through an 8-stage pipeline into attorney work-product · 59 skills · 10 departments · 20 tools</text>
</svg>
